<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waka AI Analyzer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🤖 Waka AI Analyzer</h1>
    <p>AI-powered GitHub Repository Analyzer</p>

    <div class="card">
        <input
            type="text"
            id="repoUrl"
            placeholder="https://github.com/owner/repository">

        <button onclick="analyzeRepo()">
            Analyze Repository
        </button>
    </div>

    <div class="card">
        <h2>Overall Score</h2>
        <h1 id="score">--</h1>
    </div>

    <div class="card">
        <h2>Repository Statistics</h2>

        <p><strong>Repository Size:</strong> <span id="files">--</span></p>

        <p><strong>Watchers:</strong> <span id="lines">--</span></p>

        <p><strong>Main Language:</strong> <span id="languages">--</span></p>

        <p><strong>Open Issues:</strong> <span id="issues">--</span></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
